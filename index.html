async function tryAutoOCR() {
  const file = _scanFileObj;
  if (!file) { showToast('请先导入截图'); return; }

  const statusEl = document.getElementById('scan-status');
  const btn = document.getElementById('ocr-try-btn');
  btn.disabled = true;

  let cancelled = false;
  let lastPct = -1;
  let lastMoveTime = Date.now();
  let stuckTimer = null;

  function setProgress(icon, label, pct, sub, showCancel) {
    if (cancelled) return;
    statusEl.style.display = 'block';
    const barHtml = pct != null
      ? `<div style="margin-top:6px;background:var(--border);border-radius:2px;height:4px;overflow:hidden;">
           <div style="height:100%;background:var(--blue);border-radius:2px;width:${pct}%;transition:width .3s;"></div>
         </div>`
      : '';
    const cancelBtn = showCancel
      ? `<button onclick="cancelOCR()" style="margin-top:8px;font-size:11px;background:none;border:1px solid var(--border);border-radius:4px;padding:3px 10px;color:var(--text2);cursor:pointer;">取消</button>`
      : '';
    statusEl.innerHTML = `<div style="font-size:12px;font-weight:600;">${icon} ${label}</div>
      ${sub ? `<div style="font-size:11px;color:var(--text3);margin-top:2px;">${sub}</div>` : ''}
      ${barHtml}${cancelBtn}`;
  }

  window._ocrCancel = () => {
    cancelled = true;
    clearTimeout(stuckTimer);
    btn.disabled = false;
    statusEl.innerHTML = `<div style="font-size:12px;color:var(--text2);">已取消，可对照图片手动填写</div>`;
  };

  function scheduleStuckCheck() {
    stuckTimer = setTimeout(() => {
      if (cancelled) return;
      if (Date.now() - lastMoveTime > 20000) {
        statusEl.innerHTML = `
          <div style="font-size:12px;font-weight:600;color:var(--orange);">⚠ 下载卡住了</div>
          <div style="font-size:11px;color:var(--text3);margin-top:4px;line-height:1.6;">
            CDN 连接不稳定。建议：<br>
            ① 点"粘贴文字"，从天天基金 App 长按复制确认详情<br>
            ② 或对照上方图片手动填写
          </div>
          <button onclick="cancelOCR()" style="margin-top:8px;font-size:12px;background:var(--card2);border:1px solid var(--border);border-radius:6px;padding:6px 14px;color:var(--text);cursor:pointer;">确认取消</button>`;
        btn.disabled = false;
      } else {
        scheduleStuckCheck();
      }
    }, 5000);
  }

  try {
    if ('TextDetector' in window) {
      setProgress('⚡', '使用内置 OCR 识别中…', null, '无需下载，速度最快');
      const detector = new TextDetector();
      const bitmap = await createImageBitmap(file);
      const items = await detector.detect(bitmap);
      bitmap.close();
      const rawNative = items.map(t => t.rawValue).join('\n');
      if (!cancelled) applyOCRResult(parseOCRText(rawNative), statusEl, rawNative);
      return;
    }

    if (!window.Tesseract) {
      setProgress('⏳', '加载识别引擎…', 0, '首次使用需下载引擎约 6MB，之后自动缓存', true);
      scheduleStuckCheck();
      await loadScript('https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js');
    }

    if (cancelled) return;
    setProgress('⏳', '准备中…', 0, '', true);

    const worker = await Tesseract.createWorker('chi_sim+eng', 1, {
      workerPath: 'https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/worker.min.js',
      corePath: 'https://cdn.jsdelivr.net/npm/tesseract.js-core@5/tesseract-core-simd-lstm.wasm.js',
      langPath: './tessdata',
      logger: m => {
        if (cancelled) return;
        const pct = Math.round((m.progress || 0) * 100);
        if (pct !== lastPct) { lastPct = pct; lastMoveTime = Date.now(); }
        if (m.status === 'loading tesseract core') {
          setProgress('⏳', `加载引擎核心 ${pct}%`, pct, '约 6MB，仅首次需要下载', true);
        } else if (m.status === 'loading language traineddata') {
          setProgress('⬇', `下载中文语言包 ${pct}%`, pct, '约 8MB，仅首次，下载后自动缓存', true);
        } else if (m.status === 'recognizing text') {
          setProgress('🔍', `识别中 ${pct}%`, pct, '');
        } else if (m.status === 'initialized api') {
          setProgress('✓', '引擎就绪，开始识别…', 100, '');
        }
      }
    });

    clearTimeout(stuckTimer);
    if (cancelled) { worker.terminate(); return; }
    const { data: { text } } = await worker.recognize(file);
    await worker.terminate();
    if (!cancelled) applyOCRResult(parseOCRText(text), statusEl, text);
  } catch(e) {
    if (!cancelled) {
      statusEl.innerHTML = `<div style="font-size:12px;font-weight:600;color:var(--red);">❌ 识别失败</div>
        <div style="font-size:11px;color:var(--text3);margin-top:4px;line-height:1.6;">可改用"粘贴文字"或手动填写</div>`;
      statusEl.style.display = 'block';
    }
  } finally {
    clearTimeout(stuckTimer);
    if (!cancelled) btn.disabled = false;
  }
}

function cancelOCR() {
  if (window._ocrCancel) window._ocrCancel();
}

function applyOCRResult(result, statusEl, rawText) {
  fillFromOCR(result);
  statusEl.style.display = 'block';
  const debugHtml = rawText
    ? `<details style="margin-top:6px;"><summary style="font-size:10px;color:var(--text3);cursor:pointer;">查看原始识别文字</summary>
        <pre style="font-size:10px;color:var(--text3);white-space:pre-wrap;margin-top:4px;background:var(--bg3);padding:6px;border-radius:4px;max-height:100px;overflow-y:auto;">${rawText.replace(/</g,'&lt;')}</pre>
       </details>` : '';
  if (result.found) {
    const fields = [
      result.name      && `<div><span style="color:var(--text3)">名称</span> ${result.name.slice(0,12)}${result.name.length>12?'…':''}</div>`,
      result.principal && `<div><span style="color:var(--text3)">金额</span> ${result.principal}</div>`,
      result.shares    && `<div><span style="color:var(--text3)">份额</span> ${result.shares}</div>`,
      result.nav       && `<div><span style="color:var(--text3)">净值</span> ${result.nav}</div>`,
      result.date      && `<div><span style="color:var(--text3)">日期</span> ${result.date}</div>`,
    ].filter(Boolean).join('');
    statusEl.innerHTML = `<div style="font-size:11px;font-weight:600;color:var(--green);margin-bottom:5px;">✅ 已识别</div>
      <div style="font-size:11px;line-height:1.8;">${fields}</div>
      <div style="font-size:10px;color:var(--text3);margin-top:4px;">已填入下方字段，请核对</div>${debugHtml}`;
  } else {
    statusEl.innerHTML = `<div style="font-size:11px;font-weight:600;color:var(--orange);">⚠ 识别不完整</div>
      <div style="font-size:10px;color:var(--text3);margin-top:2px;">请对照图片补全</div>${debugHtml}`;
  }
}

function parseOCRText(rawText) {
  // 先抹掉汉字之间的空格（OCR 常见多余空格），重复三次处理连续情况
  let text = rawText;
  for (let i = 0; i < 3; i++) {
    text = text.replace(/([一-龥])\s+([一-龥])/g, '$1$2');
  }
  const result = { found: false };

  // 基金名称（匹配到下一字段标签为止，>箭头从结果里删而非作为停止符）
  const nameMatch = text.match(/买入产品\s*([\s\S]+?)(?=\s*(?:买入金额|买入时间|付款方式|确认信息|买入信息))/);
  if (nameMatch) {
    result.name = nameMatch[1].replace(/[>›»<]/g, '').replace(/\s+/g, '').trim();
    if (result.name) result.found = true;
  }

  // 确认金额（优先）> 买入金额 > 顶部大金额
  const confirmAmt = text.match(/确认金额\s*([\d,]+\.?\d*)/);
  const buyAmt     = text.match(/买入金额\s*([\d,]+\.?\d*)/);
  const topAmt     = text.match(/([\d,]+\.\d{2})\s*元[\s\S]{0,30}买入成功/);
  const topAmt2    = text.match(/买入成功[\s\S]{0,30}?([\d,]+\.\d{2})\s*元/);
  if (confirmAmt) {
    result.principal = parseFloat(confirmAmt[1].replace(/,/g, ''));
    result.found = true;
  } else if (buyAmt) {
    result.principal = parseFloat(buyAmt[1].replace(/,/g, ''));
  } else if (topAmt) {
    result.principal = parseFloat(topAmt[1].replace(/,/g, ''));
  } else if (topAmt2) {
    result.principal = parseFloat(topAmt2[1].replace(/,/g, ''));
  }

  // 确认份额；兜底：数字后跟"份"
  const sharesMatch = text.match(/确认份额\s*([\d,]+\.?\d*)/);
  if (sharesMatch) {
    result.shares = parseFloat(sharesMatch[1].replace(/,/g, ''));
    result.found = true;
  } else {
    const sharesFb = text.match(/([\d,]+\.\d{2})\s*份/);
    if (sharesFb) result.shares = parseFloat(sharesFb[1].replace(/,/g, ''));
  }

  // 确认净值
  const navMatch = text.match(/确认净值\s*([\d.]+)/);
  if (navMatch) { result.nav = parseFloat(navMatch[1]); result.found = true; }

  // 日期：确认时间 > 买入时间
  const confirmDate = text.match(/确认时间\s*(\d{4}-\d{2}-\d{2})/);
  const buyDate     = text.match(/买入时间\s*(\d{4}-\d{2}-\d{2})/);
  if (confirmDate) { result.date = confirmDate[1]; result.found = true; }
  else if (buyDate) { result.date = buyDate[1]; }

  return result;
}

function fillFromOCR(result) {
  const set = (id, val) => { const el = document.getElementById(id); if (el && val != null) el.value = val; };
  set('add-name', result.name);
  set('add-date', result.date);
  set('add-nav', result.nav);
  set('add-principal', result.principal);
  set('add-shares', result.shares);
  checkSharesMatch();
}

// ════════════════════════════════════════════════════════════
// 推送通知
// ════════════════════════════════════════════════════════════
const _notifiedTriggers = new Set();

async function sendNotification(title, body, tag) {
  if (!('Notification' in window) || Notification.permission !== 'granted') return;
  try {
    const reg = await navigator.serviceWorker.ready;
    reg.active.postMessage({ type: 'SHOW_NOTIFICATION', title, body, tag });
  } catch {
    new Notification(title, { body, icon: './icon-192.png' });
  }
}

function checkAndNotify(profitTriggers) {
  for (const { fund, batch, trigger, realRate } of profitTriggers) {
    const key = `${batch.id}_${trigger.ruleIdx}`;
    if (_notifiedTriggers.has(key)) continue;
    _notifiedTriggers.add(key);
    sendNotification(
      '止盈提醒 · 止盈助手',
      `${fund}（${batch.buyDate}）已达${trigger.rule.label}，当前收益 ${fmtPct(realRate)}`,
      key
    );
  }
}

function renderNotifStatus() {
  const area = document.getElementById('notif-status-area');
  if (!area) return;
  if (!('Notification' in window) || !('serviceWorker' in navigator)) {
    area.innerHTML = `<div style="font-size:12px;color:var(--text3);">当前浏览器不支持推送通知<br>建议使用 Chrome 并添加到桌面</div>`;
    return;
  }
  const perm = Notification.permission;
  if (perm === 'granted') {
    area.innerHTML = `<div style="display:flex;align-items:center;gap:8px;">
      <span style="font-size:15px;">🔔</span>
      <div>
        <div style="font-size:13px;font-weight:600;color:var(--green);">通知已授权</div>
        <div style="font-size:11px;color:var(--text2);margin-top:1px;">净值刷新时若有批次达止盈线将推送系统通知</div>
      </div>
    </div>`;
  } else if (perm === 'denied') {
    area.innerHTML = `<div style="font-size:12px;color:var(--red);line-height:1.6;">通知权限已被拒绝<br>请在浏览器地址栏左侧的锁图标 → 网站设置中手动开启通知</div>`;
  } else {
    area.innerHTML = `<div style="font-size:12px;color:var(--text2);margin-bottom:10px;line-height:1.6;">开启后，净值刷新时若有批次达到止盈线，即使 App 在后台也会弹出系统通知。</div>
      <button class="btn btn-primary btn-full" onclick="requestNotifPermission()">🔔 授权通知推送</button>`;
  }
}

async function requestNotifPermission() {
  const result = await Notification.requestPermission();
  renderNotifStatus();
  if (result === 'granted') showToast('通知已开启');
  else showToast('通知未开启，可在浏览器设置中手动授权');
}

// ════════════════════════════════════════════════════════════
// OCR 语言包管理（Cache API + Service Worker 拦截）
// ════════════════════════════════════════════════════════════
// OCR 语言包管理
// 原理：让 Tesseract 跑一次 1×1 假图像驱动下载；
//       SW 拦截 fetch 缓存到 ocr-pack-v1；
//       安装状态用 localStorage 标志记录。
// ════════════════════════════════════════════════════════════
const OCR_CACHE_NAME = 'ocr-pack-v1';
let _ocrPackDownloadCancel = false;
let _ocrPackWorker = null;

function checkOCRPackInstalled() {
  return localStorage.getItem('ocr_pack_ready') === '1';
}

async function renderOCRPackStatus() {
  const area = document.getElementById('ocr-pack-status-area');
  if (!area) return;
  area.innerHTML = `
    <div style="display:flex;align-items:center;gap:10px;">
      <span style="font-size:18px;">📦</span>
      <div>
        <div style="font-size:13px;font-weight:600;color:var(--green);">✓ 语言数据已内置</div>
        <div style="font-size:11px;color:var(--text2);margin-top:2px;">首次使用 OCR 时自动下载引擎约 6MB，之后离线可用</div>
      </div>
    </div>`;
}

async function downloadOCRPack() {
  _ocrPackDownloadCancel = false;
  _ocrPackWorker = null;
  const area = document.getElementById('ocr-pack-status-area');
  const setStatus = html => { if (area) area.innerHTML = html; };

  const cancelBtn = `<button onclick="cancelOCRPackDownload()" style="margin-top:10px;font-size:11px;background:none;border:1px solid var(--border);border-radius:4px;padding:3px 10px;color:var(--text2);cursor:pointer;">取消</button>`;

  function showProgress(label, pct) {
    const bar = pct >= 0
      ? `<div style="margin-top:8px;background:var(--border);border-radius:2px;height:5px;overflow:hidden;">
           <div style="height:100%;background:var(--blue);border-radius:2px;width:${pct}%;transition:width .3s;"></div>
         </div>
         <div style="font-size:10px;color:var(--text3);margin-top:3px;">${pct}%</div>`
      : '';
    setStatus(`<div style="font-size:12px;font-weight:600;">⬇ 正在安装…</div>
      <div style="font-size:11px;color:var(--text2);margin-top:3px;">${label}</div>${bar}${cancelBtn}`);
  }

  // 卡住检测：60 秒无进度视为卡住
  let lastMoveTime = Date.now();
  let lastLogPct = -1;
  const stuckTimer = setInterval(() => {
    if (_ocrPackDownloadCancel) { clearInterval(stuckTimer); return; }
    if (Date.now() - lastMoveTime > 60000) {
      clearInterval(stuckTimer);
      setStatus(`<div style="font-size:12px;font-weight:600;color:var(--orange);">⚠ 下载卡住了</div>
        <div style="font-size:11px;color:var(--text3);margin-top:4px;line-height:1.6;">
          网络连接不稳定，请稍后重试。
        </div>
        <button class="btn btn-primary btn-sm" style="margin-top:10px;" onclick="downloadOCRPack()">重试</button>
        ${cancelBtn}`);
    }
  }, 5000);

  try {
    showProgress('加载识别引擎…', -1);
    if (!window.Tesseract) {
      await loadScript('https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js');
    }
    if (_ocrPackDownloadCancel) { clearInterval(stuckTimer); renderOCRPackStatus(); return; }

    _ocrPackWorker = await Tesseract.createWorker('chi_sim+eng', 1, {
      workerPath: 'https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/worker.min.js',
      corePath: 'https://cdn.jsdelivr.net/npm/tesseract.js-core@5/tesseract-core-simd-lstm.wasm.js',
      logger: m => {
        if (_ocrPackDownloadCancel) return;
        const pct = Math.round((m.progress || 0) * 100);
        if (pct !== lastLogPct) { lastLogPct = pct; lastMoveTime = Date.now(); }
        if (m.status === 'loading tesseract core') {
          showProgress(`引擎核心 (WASM) ${pct}%`, pct);
        } else if (m.status === 'loading language traineddata') {
          showProgress(`语言数据 ${pct}%`, pct);
        } else if (m.status === 'initializing api' || m.status === 'initialized api') {
          showProgress('验证中…', 99);
        }
      }
    });

    if (_ocrPackDownloadCancel) {
      clearInterval(stuckTimer);
      try { _ocrPackWorker.terminate(); } catch {}
      _ocrPackWorker = null;
      renderOCRPackStatus(); return;
    }

    // 跑 1×1 白色画布触发完整初始化
    const cv = Object.assign(document.createElement('canvas'), { width: 1, height: 1 });
    cv.getContext('2d').fillRect(0, 0, 1, 1);
    await _ocrPackWorker.recognize(cv);
    await _ocrPackWorker.terminate();
    _ocrPackWorker = null;

    clearInterval(stuckTimer);
    if (_ocrPackDownloadCancel) { renderOCRPackStatus(); return; }

    localStorage.setItem('ocr_pack_ready', '1');
    await renderOCRPackStatus();
    showToast('OCR 语言包安装完成');
  } catch (e) {
    clearInterval(stuckTimer);
    _ocrPackWorker = null;
    if (!_ocrPackDownloadCancel) {
      setStatus(`<div style="font-size:12px;font-weight:600;color:var(--red);">❌ ${e.message || '安装失败'}</div>
        <div style="font-size:11px;color:var(--text3);margin-top:4px;">请检查网络后重试</div>
        <button class="btn btn-primary btn-sm" style="margin-top:10px;" onclick="downloadOCRPack()">重试</button>`);
    }
  }
}

function cancelOCRPackDownload() {
  _ocrPackDownloadCancel = true;
  if (_ocrPackWorker) { try { _ocrPackWorker.terminate(); } catch {} _ocrPackWorker = null; }
  renderOCRPackStatus();
}

async function uninstallOCRPack() {
  localStorage.removeItem('ocr_pack_ready');
  try { await caches.delete(OCR_CACHE_NAME); } catch {}
  await renderOCRPackStatus();
  showToast('已标记为未安装，下次使用前需重新安装');
}

function switchToSettingsOCR() {
  const btns = document.querySelectorAll('.tab-btn');
  const settingsBtn = btns[btns.length - 1];
  if (settingsBtn) switchTab('settings', settingsBtn);
  setTimeout(() => {
    document.getElementById('ocr-pack-status-area')?.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 200);
}


// ════════════════════════════════════════════════════════════
// 初始化
// ════════════════════════════════════════════════════════════
(function init() {
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  }
  loadDB();
  renderHoldings();
  updateCountdown();
  setInterval(updateCountdown, 1000);
  scheduleAutoRefresh();
})();
</script>
